<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
  </marker>
</defs>
<rect width="980" height="300" fill="#ffffff"/>
<text x="20" y="40" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#1e293b" text-anchor="start" font-weight="600" >One simulation tick of the repulsion force (all on the GPU)</text><rect x="20" y="96" width="150" height="110" rx="9" fill="#f6f8fb" stroke="#94a3b8" stroke-width="1.6"/><text x="95" y="120" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#94a3b8" text-anchor="middle" font-weight="600" >positions</text><text x="95" y="142" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >one texel per point</text><text x="95" y="159" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >(x, y)</text><line x1="170.0" y1="151.0" x2="208.0" y2="151.0" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)" /><rect x="210" y="96" width="220" height="110" rx="9" fill="#d3ece9" stroke="#2a9d8f" stroke-width="1.6"/><text x="320" y="120" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#2a9d8f" text-anchor="middle" font-weight="600" >1 · aggregate levels</text><text x="320" y="142" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >draw n points into each grid,</text><text x="320" y="159" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >additive blend accumulates</text><text x="320" y="176" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >[Σx, Σy, count] per cell</text><line x1="430.0" y1="151.0" x2="468.0" y2="151.0" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)" /><rect x="470" y="96" width="220" height="110" rx="9" fill="#d7e6ff" stroke="#3a86ff" stroke-width="1.6"/><text x="580" y="120" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#3a86ff" text-anchor="middle" font-weight="600" >2 · build near-field slots</text><text x="580" y="142" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >8 depth-peel passes over the</text><text x="580" y="159" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >finest grid: a fresh random</text><text x="580" y="176" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >8-subset per cell, every tick</text><line x1="690.0" y1="151.0" x2="728.0" y2="151.0" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)" /><rect x="730" y="96" width="230" height="110" rx="9" fill="#fae8cd" stroke="#e9a13b" stroke-width="1.6"/><text x="845" y="120" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#e9a13b" text-anchor="middle" font-weight="600" >3 · force passes</text><text x="845" y="142" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >per level: centroid repulsion</text><text x="845" y="159" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >+ near field: weighted pairs;</text><text x="845" y="176" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11.5" fill="#1e293b" text-anchor="middle" font-weight="normal" >all add into the velocity texture</text><text x="20" y="250" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#64748b" text-anchor="start" font-weight="normal" >The integration step (velocity → positions) is shared with all other forces and unchanged.</text><text x="20" y="272" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#64748b" text-anchor="start" font-weight="normal" >Levels: 4², 8², … up to ≈ 2·√n per axis (capped 512²). Slot textures: 8 × finest grid, [point index, hash] each.</text>
</svg>