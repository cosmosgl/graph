-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="start" font-weight="normal" >hash 0.64</text><rect x="380" y="248" width="252" height="26" rx="5" fill="#d7e6ff" stroke="#3a86ff"/><text x="390" y="265" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#3a86ff" text-anchor="start" font-weight="600" >slot 5</text><text x="450" y="265" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >point #7</text><text x="540" y="265" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="start" font-weight="normal" >hash 0.74</text><rect x="380" y="282" width="252" height="26" rx="5" fill="#d7e6ff" stroke="#3a86ff"/><text x="390" y="299" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#3a86ff" text-anchor="start" font-weight="600" >slot 6</text><text x="450" y="299" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >point #1</text><text x="540" y="299" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="start" font-weight="normal" >hash 0.77</text><rect x="380" y="316" width="252" height="26" rx="5" fill="#d7e6ff" stroke="#3a86ff"/><text x="390" y="333" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#3a86ff" text-anchor="start" font-weight="600" >slot 7</text><text x="450" y="333" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >point #5</text><text x="540" y="333" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="start" font-weight="normal" >hash 0.81</text><text x="690" y="40" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="15" fill="#1e293b" text-anchor="start" font-weight="600" >Horvitz–Thompson weighting</text><text x="690" y="58" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="start" font-weight="normal" >sampled sum = full sum, on average</text><rect x="690" y="78" width="264" height="180" rx="8" fill="#faf7ff" stroke="#7c3aed"/><text x="706" y="110" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#1e293b" text-anchor="start" font-weight="normal" >cell has 12 other points,</text><text x="706" y="130" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#1e293b" text-anchor="start" font-weight="normal" >8 of them sampled →</text><text x="706" y="166" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14.5" fill="#7c3aed" text-anchor="start" font-weight="600" >F  ≈  (12 / 8) · Σ F(sampled pair)</text><text x="706" y="200" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#1e293b" text-anchor="start" font-weight="normal" >E[F] = exact all-pairs sum</text><text x="706" y="220" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#64748b" text-anchor="start" font-weight="normal" >(unbiased, no centroid term)</text><text x="706" y="244" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" fill="#1e293b" text-anchor="start" font-weight="600" >≤ 8 points in cell → exact.</text><text x="690" y="288" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#64748b" text-anchor="start" font-weight="normal" >A fresh random subset every tick:</text><text x="690" y="306" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#64748b" text-anchor="start" font-weight="normal" >the sampling noise shrinks with alpha</text><text x="690" y="324" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#64748b" text-anchor="start" font-weight="normal" >and acts as annealing jitter.</text>
</svg>