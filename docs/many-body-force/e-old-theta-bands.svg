t x="40" y="366" width="14" height="14" fill="#fbdada" stroke="#cbd5e1"/><text x="60" y="377" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" fill="#1e293b" text-anchor="start" font-weight="normal" >own cell: repelled from its own centroid (radial only)</text><text x="380" y="88" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="15" fill="#1e293b" text-anchor="start" font-weight="600" >Structural problems this created</text><text x="380" y="120" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#e05555" text-anchor="start" font-weight="600" >1 · Radial-only close force</text><text x="380" y="138" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >The nearest — strongest — interaction was “me vs my cell’s centroid”:</text><text x="380" y="154" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >a force with no tangential part. Dense hubs flattened into disks and petals.</text><text x="380" y="184" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#e05555" text-anchor="start" font-weight="600" >2 · theta seams and tuning</text><text x="380" y="202" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >Band boundaries moved with simulationRepulsionTheta; a wrong value</text><text x="380" y="218" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >either double-counted or skipped mass, and the “right” value varied per graph.</text><text x="380" y="248" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13.5" fill="#e05555" text-anchor="start" font-weight="600" >3 · Approximate even for tiny graphs</text><text x="380" y="266" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >Two points in one cell still repelled centroid-wise —</text><text x="380" y="282" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="normal" >small graphs paid the approximation without needing one.</text><text x="380" y="322" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#64748b" text-anchor="start" font-weight="normal" >The far-field idea (coarser grids for farther mass) was sound — the new</text><text x="380" y="340" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12.5" fill="#64748b" text-anchor="start" font-weight="normal" >algorithm keeps it, and replaces everything inside the 3×3 shell.</text>
</svg>